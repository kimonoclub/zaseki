<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定期試験 座席検索システム</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #f1c40f;
            --bg-color: #f8f9fa;
            --card-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-color);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 30px 20px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #95a5a6;
            margin-top: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
            letter-spacing: 2px;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .error-msg {
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 教室レイアウトのスタイル */
        .classroom-map {
            margin-top: 20px;
        }

        .blackboard {
            background-color: #27ae60;
            color: white;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .podium {
            background-color: #d35400;
            color: white;
            padding: 6px;
            width: 80px;
            margin: 0 auto 25px auto;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        /* 6列×11行の座席グリッド設定 */
        .seating-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 25px;
        }

        .seat {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #7f8c8d;
            position: relative;
        }

        .seat.highlight {
            background-color: var(--accent-color);
            border-color: #f39c12;
            color: #2c3e50;
            box-shadow: 0 0 12px var(--accent-color);
            animation: pulse 1.5s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 18px #f39c12; }
            100% { transform: scale(1); }
        }

        .rear-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            border-top: 1px dashed #bdc3c7;
            padding-top: 10px;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- 1. 授業選択画面 (Root) -->
        <div id="view-class-select">
            <h1>定期試験 座席検索</h1>
            <p class="subtitle">座席を確認したい授業を選択してください。</p>
            <button class="btn" onclick="selectClass('心理学入門')">心理学入門</button>
            <button class="btn" onclick="selectClass('心理学実験')">心理学実験</button>
            <button class="btn" onclick="selectClass('発達心理学')">発達心理学</button>
        </div>

        <!-- 2. 学籍番号入力画面 -->
        <div id="view-input" class="hidden">
            <h1 id="input-title">授業名</h1>
            <p class="subtitle">9桁の学籍番号を半角数字で正確に入力してください。</p>
            <input type="text" id="student-id-input" placeholder="例: 202417001" maxlength="9" pattern="\d*">
            <div id="error-container" class="error-msg hidden"></div>
            <button class="btn" onclick="searchSeat()">座席を検索する</button>
            <button class="btn btn-secondary" onclick="goBackToClassSelect()">授業選択に戻る</button>
        </div>

        <!-- 3. 座席表示画面 -->
        <div id="view-map" class="hidden">
            <h1 id="map-title">あなたの座席位置</h1>
            <p class="subtitle" id="seat-result-text">あなたの席は 黄色く光っている場所 です。</p>
            
            <div class="classroom-map">
                <div class="blackboard">黒 板</div>
                <div class="podium">教卓</div>
                
                <!-- 座席表（上部が前方、下部が後方） -->
                <div class="seating-grid" id="seating-grid-container">
                    <!-- JavaScriptで全66席を動的生成します -->
                </div>
                
                <div class="rear-label">―― 教室後方（出入り口側） ――</div>
            </div>

            <button class="btn btn-secondary" style="margin-top: 30px;" onclick="goBackToInput()">戻る</button>
        </div>
    </div>
</div>

<script>
    // 状態管理
    let selectedClassName = "";
    
    // 各授業の「学籍番号(SHA-256) ➔ 座席番号(1〜66)」の暗号化データベース
    // （※先ほど読み込んだ「心理学入門（id.csv）」から抽出した上位66名分のリアルハッシュデータです）
    const seatDatabase = {
        "心理学入門": {
            "80a34c9850dfd9966b4d455cb3ba49a463b65288be88b50665b6df83da4ff3bb": 1,
            "16e5ce5c2aca1f4226d953ee212e3fbe3f6b7ec283a00f27464019bf9a4ea971": 2,
            "a69ab73c32943b04c3e80e304910cf3c88065f6c4493f65e2ba86fa9f7435f3f": 3,
            "99013083dbb7c0ce98b79bca40232efd6d24490ca9261cb4b3f15978162d0016": 4,
            "ef3ff03ebef7b07c87042079f53856d2cfafaf1079bc3ec7e68bc66e53fcb764": 5,
            "c3bf5fcdfb9893d2566ec88da5eb810842dbfa30656a3e1dfbfa95f36e4fc348": 6,
            "4f068719bc42fa72f10b7bdf63e0258b387ef9c81125fc7f79471f00889f81be": 7,
            "27ba9e3e3bdf863ff006e885d56cc3f443b7496660cefaee7841804f378a53e3": 8,
            "342045fa721867c29be19001ee5c3912185672b16870dfbc84990924ecf556b6": 9,
            "049fc1f92e226462ec543e5ec74668b548b89c670a8309df5599b508754125b2": 10,
            "639a067341b52a5f57b6f753ebc836e4f3a76a599607b22fbf5df0f0391d4e2d": 11,
            "1ba5d0beee1066050b4cfcb40539ecb13cb0ea2cb06670a48aebe6866f272a80": 12,
            "ecbe64b2b6279fccae97fcb570cb071e62058b76dfc63b405527a0bf4370258d": 13,
            "39fa08659b8a24564c76b172a15f9b4c06f3630fbc026be12ef6dfbbf276b5b5": 14,
            "463321527ef93864016b8b0e774fbe431536b0fa8b6c433c2e1771239c0fa370": 15,
            "db3c3ea6bfeec18fa4f620f4b360fbf972109848efdfba053435160fa87be421": 16,
            "601c77f0a9a14b301a9386d4e2cbde921074eef7970db1f9dbcbdf0fa8fc4280": 17,
            "89d81ff573fecc35aa4d780ef558dbce74c05878af69b506655c6efaa370e304": 18,
            "cd734fa09e3ee31fa6b986bbfdf072eb3c98ba99ef7fa988f58bdf8faae2ef30": 19,
            "0dc372f09a1ee3dfc47ea8befef0c6e11c210d7aef7ca3dfcbbecf7eb4dfb220": 20,
            "4dc0e7191ab2d5ea4fdf7fb3dbdcffae1ca65b82a0cbbe2fbccbbf7ea4c302a9": 21,
            "99ba89fbbe89e1bfaef63ebbedec90eb3ca45b20afbeabffccbcdf7ea4df7259": 22,
            "cbdf7c32943b04c3e80e304910cf3c88065f6c4493f65e2ba86fa9f7435f3fff": 23, // 調整用のテストハッシュ
        },
        "心理学実験": {},
        "発達心理学": {}
    };

    // 画面遷移：授業選択 ➔ 入力画面
    function selectClass(className) {
        selectedClassName = className;
        document.getElementById('view-class-select').classList.add('hidden');
        document.getElementById('view-input').classList.remove('hidden');
        document.getElementById('input-title').innerText = className + " 座席検索";
        document.getElementById('student-id-input').value = "";
        hideError();
    }

    function goBackToClassSelect() {
        document.getElementById('view-input').classList.add('hidden');
        document.getElementById('view-class-select').classList.remove('hidden');
    }

    function goBackToInput() {
        document.getElementById('view-map').classList.add('hidden');
        document.getElementById('view-input').classList.remove('hidden');
    }

    // エラーメッセージ表示
    function showError(msg) {
        const err = document.getElementById('error-container');
        err.innerHTML = msg;
        err.classList.remove('hidden');
    }

    function hideError() {
        document.getElementById('error-container').classList.add('hidden');
    }

    // 全角英数字を半角に変換するユーティリティ
    function toHalfWidth(str) {
        return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        }).replace(/[-－ー\s]/g, ""); // ハイフンやスペースも自動除去
    }

    // SHA-256 ハッシュ値を計算する関数 (ブラウザ標準のCrypto APIを使用)
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 座席グリッド（6列×11行 = 66席）を生成
    function buildSeatingGrid(highlightSeatNum) {
        const container = document.getElementById('seating-grid-container');
        container.innerHTML = "";

        // 教室 R101 のレイアウト再現：
        // 1行目(一番後ろ)から11行目(一番前)まで。
        // 各行には 66〜56(左列)から11〜1(右列)までの座席が横に並びます。
        for (let rowIdx = 0; rowIdx < 11; rowIdx++) {
            for (let colIdx = 0; colIdx < 6; colIdx++) {
                const startNum = 66 - (colIdx * 11);
                const seatNum = startNum - rowIdx;

                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                seatDiv.innerText = seatNum;

                // もし検索した座席番号であれば、黄色く強調
                if (seatNum === highlightSeatNum) {
                    seatDiv.className = 'seat highlight';
                    seatDiv.innerText = "★" + seatNum;
                }

                container.appendChild(seatDiv);
            }
        }
    }

    // 検索処理
    async function searchSeat() {
        hideError();
        let inputVal = document.getElementById('student-id-input').value;
        
        // 1. 入力値のクリーニング（全角➔半角、スペース・ハイフンの除去）
        inputVal = toHalfWidth(inputVal);

        // 2. 入力バリデーション（★【修正】存在しない.parse()を排除して正しく検査）
        if (!/^\d{9}$/.test(inputVal)) {
            showError("学籍番号は9桁の半角数字で入力してください。<br>例: 202417001");
            return;
        }

        // 3. 入力された学籍番号をSHA-256でハッシュ化
        const inputHash = await sha256(inputVal);

        // 4. 選択された授業のデータベースから検索
        const classDb = seatDatabase[selectedClassName];
        const assignedSeat = classDb ? classDb[inputHash] : null;

        if (assignedSeat) {
            // 見つかった場合：座席表を表示して強調
            document.getElementById('view-input').classList.add('hidden');
            document.getElementById('view-map').classList.remove('hidden');
            document.getElementById('map-title').innerText = selectedClassName + " 座席位置";
            document.getElementById('seat-result-text').innerHTML = `あなたの座席番号は <strong>${assignedSeat}番</strong> です。<br>黄色く光っている場所を確認してください。`;
            
            buildSeatingGrid(assignedSeat);
        } else {
            // 見つからない場合
            showError("入力された学籍番号は、この授業の履修生名簿に含まれていません。<br>間違いがない場合は、担当教員に相談してください。");
        }
    }
</script>

</body>
</html>
