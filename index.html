<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定期試験 座席検索システム</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #f1c40f;
            --bg-color: #f8f9fa;
            --card-color: #ffffff;
            --desk-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 15px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-color);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 30px 15px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #95a5a6;
            margin-top: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
            letter-spacing: 2px;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .error-msg {
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 教室レイアウトのスタイル */
        .classroom-map {
            margin-top: 20px;
            overflow-x: auto; /* スマホではみ出た場合にスクロール可能に */
        }

        .blackboard {
            background-color: #27ae60;
            color: white;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .podium {
            background-color: #d35400;
            color: white;
            padding: 6px;
            width: 80px;
            margin: 0 auto 25px auto;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        /* 
           3つの机ブロック ＋ 2つの通路 = 5つのグリッドカラム
           左机ブロック(1fr) ➔ 通路(12px) ➔ 中央机ブロック(1fr) ➔ 通路(12px) ➔ 右机ブロック(1fr)
        */
        .seating-grid {
            display: grid;
            grid-template-columns: 1fr 15px 1fr 15px 1fr;
            gap: 12px 0; /* 行間は12px、列間は通路で制御するため0 */
            margin-bottom: 25px;
            min-width: 450px; /* レイアウト崩れ防止 */
        }

        /* 通路用の空要素 */
        .aisle {
            grid-row: span 11; /* 11行分ぶち抜き */
            background-color: transparent;
        }

        /* 二人が座る「長い机」のコンテナ */
        .desk {
            background-color: var(--desk-color);
            border: 1px dashed #cbd5e1;
            border-radius: 6px;
            padding: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        /* 机の左右の座席 */
        .seat {
            background-color: #ffffff;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            flex: 1;
            aspect-ratio: 1.2; /* 少し横長にすることで机の端感を出します */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #475569;
            position: relative;
        }

        /* 左右位置を示す極小ラベル（L/R） */
        .seat::after {
            content: attr(data-position);
            font-size: 0.55rem;
            color: #94a3b8;
            margin-top: 1px;
        }

        /* ハイライト（検索でヒットした席） */
        .seat.highlight {
            background-color: var(--accent-color);
            border-color: #eab308;
            color: #1e293b;
            box-shadow: 0 0 12px var(--accent-color);
            animation: pulse 1.5s infinite;
            z-index: 10;
        }

        .seat.highlight::after {
            color: #854d0e;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 16px #eab308; }
            100% { transform: scale(1); }
        }

        .rear-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            border-top: 1px dashed #bdc3c7;
            padding-top: 10px;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- 1. 授業選択画面 -->
        <div id="view-class-select">
            <h1>定期試験 座席検索</h1>
            <p class="subtitle">座席を確認したい授業を選択してください。</p>
            <button class="btn" onclick="selectClass('心理学入門')">心理学入門</button>
            <button class="btn" onclick="selectClass('心理学実験')">心理学実験</button>
            <button class="btn" onclick="selectClass('発達心理学')">発達心理学</button>
        </div>

        <!-- 2. 学籍番号入力画面 -->
        <div id="view-input" class="hidden">
            <h1 id="input-title">授業名</h1>
            <p class="subtitle">9桁の学籍番号を半角数字で正確に入力してください。</p>
            <input type="text" id="student-id-input" placeholder="例: 202417001" maxlength="9" pattern="\d*">
            <div id="error-container" class="error-msg hidden"></div>
            <button class="btn" onclick="searchSeat()">座席を検索する</button>
            <button class="btn btn-secondary" onclick="goBackToClassSelect()">授業選択に戻る</button>
        </div>

        <!-- 3. 座席表示画面 -->
        <div id="view-map" class="hidden">
            <h1 id="map-title">あなたの座席位置</h1>
            <p class="subtitle" id="seat-result-text">あなたの席は 黄色く光っている場所 です。</p>
            
            <div class="classroom-map">
                <div class="blackboard">黒 板</div>
                <div class="podium">教卓</div>
                
                <!-- 座席表（上部が前方、下部が後方。通路と長い机を再現） -->
                <div class="seating-grid" id="seating-grid-container">
                    <!-- JavaScriptで動的に席と通路を生成します -->
                </div>
                
                <div class="rear-label">―― 教室後方（出入り口側） ――</div>
            </div>

            <button class="btn btn-secondary" style="margin-top: 30px;" onclick="goBackToInput()">戻る</button>
        </div>
    </div>
</div>

    function selectClass(className) {
        selectedClassName = className;
        document.getElementById('view-class-select').classList.add('hidden');
        document.getElementById('view-input').classList.remove('hidden');
        document.getElementById('input-title').innerText = className + " 座席検索";
        document.getElementById('student-id-input').value = "";
        hideError();
    }

    function goBackToClassSelect() {
        document.getElementById('view-input').classList.add('hidden');
        document.getElementById('view-class-select').classList.remove('hidden');
    }

    function goBackToInput() {
        document.getElementById('view-map').classList.add('hidden');
        document.getElementById('view-input').classList.remove('hidden');
    }

    function showError(msg) {
        const err = document.getElementById('error-container');
        err.innerHTML = msg;
        err.classList.remove('hidden');
    }

    function hideError() {
        document.getElementById('error-container').classList.add('hidden');
    }

    function toHalfWidth(str) {
        return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        }).replace(/[-－ー\s]/g, "");
    }

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ★ 180度反転 ＋ 3つのブロック（2列・通路・2列・通路・2列） ➔ 机の両端の表現
    function buildSeatingGrid(highlightSeatNum) {
        const container = document.getElementById('seating-grid-container');
        container.innerHTML = "";

        // R101講義室の完全な行（最前列 1 行目 から 最後列 11 行目までをループ）
        for (let rowIdx = 1; rowIdx <= 11; rowIdx++) {
            
            // --- 【ブロック 1: 左側の机（座席番号56〜66 と 45〜55）】 ---
            const leftSeat = 56 + (rowIdx - 1);  // 最前列は56, 最後列は66
            const rightSeat1 = 45 + (rowIdx - 1); // 最前列は45, 最後列は55
            createDesk(container, leftSeat, rightSeat1, highlightSeatNum);

            // --- 【通路 1】 ---
            if (rowIdx === 1) {
                const aisle = document.createElement('div');
                aisle.className = 'aisle';
                container.appendChild(aisle);
            }

            // --- 【ブロック 2: 中央の机（座席番号34〜44 と 23〜33）】 ---
            const leftSeat2 = 34 + (rowIdx - 1);  // 最前列は34, 最後列は44
            const rightSeat2 = 23 + (rowIdx - 1); // 最前列は23, 最後列は33
            createDesk(container, leftSeat2, rightSeat2, highlightSeatNum);

            // --- 【通路 2】 ---
            if (rowIdx === 1) {
                const aisle = document.createElement('div');
                aisle.className = 'aisle';
                container.appendChild(aisle);
            }

            // --- 【ブロック 3: 右側の机（座席番号12〜22 と 1〜11）】 ---
            const leftSeat3 = 12 + (rowIdx - 1);  // 最前列は12, 最後列は22
            const rightSeat3 = 1 + (rowIdx - 1);   // 最前列は1, 最後列は11
            createDesk(container, leftSeat3, rightSeat3, highlightSeatNum);
        }
    }

    // 二人が座る「長い机」を1台生成する関数
    function createDesk(container, leftSeatNum, rightSeatNum, highlightSeatNum) {
        const deskDiv = document.createElement('div');
        deskDiv.className = 'desk';

        // 左端の席
        const seatL = document.createElement('div');
        seatL.className = 'seat';
        seatL.innerText = leftSeatNum;
        seatL.setAttribute('data-position', '左端');
        if (leftSeatNum === highlightSeatNum) {
            seatL.className = 'seat highlight';
            seatL.innerText = "★" + leftSeatNum;
        }

        // 右端の席
        const seatR = document.createElement('div');
        seatR.className = 'seat';
        seatR.innerText = rightSeatNum;
        seatR.setAttribute('data-position', '右端');
        if (rightSeatNum === highlightSeatNum) {
            seatR.className = 'seat highlight';
            seatR.innerText = "★" + rightSeatNum;
        }

        // 机に席を合体
        deskDiv.appendChild(seatL);
        deskDiv.appendChild(seatR);
        container.appendChild(deskDiv);
    }

    async function searchSeat() {
        hideError();
        let inputVal = document.getElementById('student-id-input').value;
        inputVal = toHalfWidth(inputVal);

        if (!/^\d{9}$/.test(inputVal)) {
            showError("学籍番号は9桁の半角数字で入力してください。<br>例: 202417001");
            return;
        }

        const inputHash = await sha256(inputVal);
        const classDb = seatDatabase[selectedClassName];
        const assignedSeat = classDb ? classDb[inputHash] : null;

        if (assignedSeat) {
            document.getElementById('view-input').classList.add('hidden');
            document.getElementById('view-map').classList.remove('hidden');
            document.getElementById('map-title').innerText = selectedClassName + " 座席位置";
            document.getElementById('seat-result-text').innerHTML = `あなたの座席番号は <strong>${assignedSeat}番</strong> です。<br>机の両端の、黄色く光っている場所を確認してください。`;
            
            buildSeatingGrid(assignedSeat);
        } else {
            showError("入力された学籍番号は、この授業の履修生名簿に含まれていません。<br>間違いがない場合は、担当教員に相談してください。");
        }
    }
</script>

</html>
